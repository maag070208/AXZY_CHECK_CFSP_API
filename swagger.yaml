openapi: 3.0.3
info:
  title: AXZY CHECK API
  description: Documentación técnica completa de la API de AXZY CHECK. Cubre gestión
    operativa, administrativa y analítica.
  version: 1.3.2
servers:
- url: http://localhost:4444/api/v1
  description: Local server
tags:
- name: auth
  description: Control de acceso
- name: users
  description: Personal y administración
- name: clients
  description: Empresas clientes
- name: zones
  description: Áreas/Zonas geográficas
- name: locations
  description: Puntos de control / Spots
- name: assignments
  description: Órdenes de trabajo y tareas
- name: rounds
  description: Recorridos de seguridad
- name: incidents
  description: Gestión de anomalías
- name: maintenance
  description: Soporte técnico
- name: schedules
  description: Horarios y turnos
- name: kardex
  description: Bitácora de actividad
- name: reports
  description: Analítica y KPIs
- name: settings
  description: Configuración maestra y catálogos
- name: sync
  description: Sincronización móvil offline
- name: recurring
  description: Tareas recurrentes
- name: catalog
  description: Listas rápidas de sistema
- name: home
  description: Métricas y dashboard de inicio
paths:
  /home/stats:
    get:
      tags:
      - home
      summary: Obtener métricas para el dashboard
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      activeRoundsCount:
                        type: integer
                      activeRounds:
                        type: array
                        items:
                          $ref: '#/components/schemas/Round'
                      pendingIncidentsCount:
                        type: integer
                      pendingMaintenanceCount:
                        type: integer
                  messages:
                    type: array
                    items:
                      type: string
  /users/login:
    post:
      tags:
      - auth
      summary: Iniciar sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultLogin'
        '401':
          description: No autorizado (Credenciales inválidas)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '403':
          description: Prohibido (Cuenta inactiva o fuera de horario)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /users:
    get:
      tags:
      - users
      summary: Listar usuarios
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultListUser'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
    post:
      tags:
      - users
      summary: Crear usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResult'
        '400':
          description: Error de validación o usuario duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /users/datatable:
    post:
      tags:
      - users
      summary: Tabla paginada de usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataTableFetchParams'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableUser'
        '400':
          description: Error en filtros o paginación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /users/{id}:
    get:
      tags:
      - users
      summary: Detalle de usuario
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatable'
        '400':
          description: Petición inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
    put:
      tags:
      - users
      summary: Actualizar usuario
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResult'
        '400':
          description: Error de validación o usuario duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
    delete:
      tags:
      - users
      summary: Eliminar usuario
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResult'
        '400':
          description: Petición inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /users/{id}/password:
    put:
      tags:
      - users
      summary: Cambiar contraseña (Usuario propio)
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - oldPassword
              - newPassword
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResult'
        '400':
          description: Error de validación o contraseña incorrecta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /users/{id}/reset-password:
    put:
      tags:
      - users
      summary: Resetear contraseña (Administrador)
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - newPassword
              properties:
                newPassword:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResult'
        '400':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '403':
          description: Prohibido (No es administrador)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /users/logout:
    post:
      tags:
      - auth
      summary: Cerrar sesión
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResult'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /clients:
    get:
      tags:
      - clients
      summary: Listar clientes
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultListClient'
    post:
      tags:
      - clients
      summary: Crear cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
      responses:
        '201':
          description: Creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultListClient'
        '400':
          description: Datos inválidos o cliente duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /clients/datatable:
    post:
      tags:
      - clients
      summary: Tabla paginada de clientes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataTableFetchParams'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableClient'
        '400':
          description: Error en filtros
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /clients/{id}:
    get:
      tags:
      - clients
      summary: Detalle de cliente
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableClient'
        '400':
          description: Error de paginación o filtros
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
    put:
      tags:
      - clients
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultListClient'
    delete:
      tags:
      - clients
      summary: Eliminar cliente (Cascading)
      description: Elimina físicamente el cliente y todos sus datos relacionados (Zonas,
        Ubicaciones, Rondas, Incidencias, Tareas). Los usuarios operativos (guardias)
        son desasignados (clientId = null) pero no eliminados.
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultListClient'
  /zones:
    post:
      tags:
      - zones
      summary: Crear zona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ZoneCreate'
      responses:
        '201':
          description: Creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableClient'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /zones/client/{clientId}:
    get:
      tags:
      - zones
      summary: Listar zonas de un cliente
      parameters:
      - in: path
        name: clientId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableClient'
  /zones/datatable:
    post:
      tags:
      - zones
      summary: Tabla paginada de zonas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataTableFetchParams'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableZone'
        '400':
          description: Error en filtros
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /zones/{id}:
    put:
      tags:
      - zones
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ZoneUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableZone'
        '400':
          description: Error de paginación o filtros
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
    delete:
      tags:
      - zones
      summary: Eliminar zona
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableZone'
        '400':
          description: Petición inválida o restricción de llave foránea
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /locations:
    get:
      tags:
      - locations
      summary: Listar ubicaciones
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableZone'
    post:
      tags:
      - locations
      summary: Crear ubicación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationCreate'
      responses:
        '201':
          description: Creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultListClient'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /locations/datatable:
    post:
      tags:
      - locations
      summary: Tabla paginada de ubicaciones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataTableFetchParams'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableLocation'
        '400':
          description: Error de paginación o filtros
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /locations/{id}:
    get:
      tags:
      - locations
      summary: Detalle de ubicación
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultListLocation'
    put:
      tags:
      - locations
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultListLocation'
    delete:
      tags:
      - locations
      summary: Eliminar ubicación (Cascading)
      description: Elimina físicamente la ubicación y sus dependencias (Kardex, Tareas
        recurrentes, Tareas activas).
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableLocation'
        '400':
          description: Petición inválida o restricción de llave foránea
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /locations/print-bulk-qr:
    post:
      tags:
      - locations
      summary: Generar PDF masivo con códigos QR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: Archivo PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
  /assignments:
    get:
      tags:
      - assignments
      summary: Listar todas las asignaciones
      parameters:
      - in: query
        name: guardId
        schema:
          type: string
          format: uuid
      - in: query
        name: status
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultListAssignment'
    post:
      tags:
      - assignments
      summary: Crear asignación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentCreate'
      responses:
        '201':
          description: Creado
  /assignments/me:
    get:
      tags:
      - assignments
      summary: Mis asignaciones activas (Guardia)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultListAssignment'
  /assignments/datatable:
    post:
      tags:
      - assignments
      summary: Tabla paginada de asignaciones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataTableFetchParams'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableAssignment'
        '400':
          description: Error de paginación o filtros
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /assignments/{id}/status:
    patch:
      tags:
      - assignments
      summary: Actualizar estado de asignación
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                  - PENDING
                  - CHECKING
                  - COMPLETED
                  - ANOMALY
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultDatatableAssignment'
        '400':
          description: Petición inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
  /assignments/tasks/{taskId}/toggle:
    patch:
      tags:
      - assignments
      summary: Alternar check de tarea específica
      parameters:
      - in: path
        name: taskId
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResult'
        '400':
          description: Petición inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultError'
        '404':
